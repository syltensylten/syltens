<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Listenables</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" href="img/syltensb.png" type="image/png" />
    </head>
    <body>
        <div class="container">
            <div class="title">
                <h2>Listenable audio files</h2>
                <a href="index.html" class="home-icon"
                    ><img src="img/syltensb.png" alt="home"
                /></a>
            </div>

            <div class="category-title">
                <a><h3>Music</h3></a>
                <a><h3>Sounds</h3></a>
                <a><h3>Noise</h3></a>
            </div>

            <div class="sub-title"><h4>Recents</h4></div>
            <div class="audio-grid">
                <div class="column">
                    <img src="audio/covers/bad.gif"/>
                    <img src="audio/covers/nyår_dm.gif"/>
                    <img src="audio/covers/samladedigital.gif"/>
                    <img src="audio/covers/tshirshufflet.gif"/>
                </div>
            </div>

            <div class="popup-audio">
                <img src="img/2024.png">
                <audio controls>
                    <source src="audio/taget.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <script>
            document.querySelectorAll(".audio-grid .column img").forEach((img) => {
                    img.onclick = () => {
                        const popupAudio = document.querySelector(".popup-audio");
                        if (popupAudio.style.display !== "block") {
                            popupAudio.style.display = "block";
                            popupAudio.querySelector("img").src = img.getAttribute("src");
                        }
            document.querySelector(".popup-audio").onclick = (e) => {
                if (e.target === document.querySelector(".popup-audio")) {
                    document.querySelector(".popup-audio").style.display = "none";
                }
            };
                        }
                    };
        </script>
    </body>
</html>
